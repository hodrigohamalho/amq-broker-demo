          image: registry.redhat.io/amq7/amq-broker-rhel9@sha256:ec6a178d76a1521ea68ef312b43db6b952802d02431ad81f1b9bd107015c621d
          command: ["/bin/bash","-c"]
          args:
            - |
              P='?reconnectAttempts=2&retryInterval=1000&callTimeout=4000&connectionTTL=6000&clientFailureCheckPeriod=2000'
              L="tcp://site2-broker-all-0-svc:61616$P"; R="tcp://site1-broker-all-0-svc:61616$P"
              echo "[SITE2-CONSUMER] <- site2Queue (prefers site2, fails over to site1)";
              while true; do
                /opt/amq/bin/artemis consumer --url "$L" --user admin --password admin --destination queue://site2Queue --message-count 100000 --receive-timeout 15000 --verbose \
                || { echo "[SITE2-CONSUMER] site2 down -> failover to site1"; /opt/amq/bin/artemis consumer --url "$R" --user admin --password admin --destination queue://site2Queue --message-count 100000 --receive-timeout 15000 --verbose; }
                sleep 1;
              done
