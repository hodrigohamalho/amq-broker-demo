# Active/active traffic with CLIENT FAILOVER, so a site outage stops nothing.
# Failover is explicit in the shell: try the LOCAL site; if it fails, try the REMOTE
# one (`artemis <local> || artemis <remote>`), in a loop. When the local site is back,
# the next iteration prefers it again. A low reconnectAttempts makes the local attempt
# fail fast so the fall-through to the remote site is quick.
#   Site 1 apps: local=site1, remote=site2    Site 2 apps: local=site2, remote=site1
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: site1-producer, namespace: amq-aa, labels: { app: site1-producer, demo: amq-aa, site: site1 } }
spec:
  replicas: 1
  selector: { matchLabels: { app: site1-producer } }
  template:
    metadata: { labels: { app: site1-producer, demo: amq-aa, site: site1 } }
    spec:
      containers:
        - name: producer
          image: registry.redhat.io/amq7/amq-broker-rhel9@sha256:ec6a178d76a1521ea68ef312b43db6b952802d02431ad81f1b9bd107015c621d
          command: ["/bin/bash","-c"]
          args:
            - |
              P='?reconnectAttempts=2&retryInterval=1000&callTimeout=4000&connectionTTL=6000&clientFailureCheckPeriod=2000'
              L="tcp://site1-broker-all-0-svc:61616$P"; R="tcp://site2-broker-all-0-svc:61616$P"
              echo "[SITE1-PRODUCER] prefers site1, fails over to site2";
              while true; do
                /opt/amq/bin/artemis producer --url "$L" --user admin --password admin --destination queue://demoQueue --message-count 5 --sleep 1500 --message-size 200 \
                || { echo "[SITE1-PRODUCER] site1 down -> failover to site2"; /opt/amq/bin/artemis producer --url "$R" --user admin --password admin --destination queue://demoQueue --message-count 5 --sleep 1500 --message-size 200; }
                sleep 1;
              done
---
