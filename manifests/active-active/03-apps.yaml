# Active/active, PARTITIONED by queue — each queue has a single owning site, so no
# queue is consumed at both sites at once (no cross-site double-delivery).
#   Site 1 owns site1Queue (produce + 2 consumers)   Site 2 owns site2Queue (produce + 2 consumers)
# The dual mirror replicates BOTH queues both ways, so each site keeps a warm copy of
# the other's queue for DR. Client failover (local || remote) keeps things running on a
# site outage: the failed-over apps consume their queue from the surviving site's copy
# — still a single consuming site.
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: site1-producer, namespace: amq-aa, labels: { app: site1-producer, demo: amq-aa, site: site1 } }
spec:
  replicas: 1
  selector: { matchLabels: { app: site1-producer } }
  template:
    metadata: { labels: { app: site1-producer, demo: amq-aa, site: site1 } }
    spec:
      containers:
        - name: producer
          image: registry.redhat.io/amq7/amq-broker-rhel9@sha256:ec6a178d76a1521ea68ef312b43db6b952802d02431ad81f1b9bd107015c621d
          command: ["/bin/bash","-c"]
          args:
            - |
              P='?reconnectAttempts=2&retryInterval=1000&callTimeout=4000&connectionTTL=6000&clientFailureCheckPeriod=2000'
              L="tcp://site1-broker-all-0-svc:61616$P"; R="tcp://site2-broker-all-0-svc:61616$P"
              echo "[SITE1-PRODUCER] -> site1Queue (prefers site1, fails over to site2)";
              while true; do
                /opt/amq/bin/artemis producer --url "$L" --user admin --password admin --destination queue://site1Queue --message-count 5 --sleep 1500 --message-size 200 \
                || { echo "[SITE1-PRODUCER] site1 down -> failover to site2"; /opt/amq/bin/artemis producer --url "$R" --user admin --password admin --destination queue://site1Queue --message-count 5 --sleep 1500 --message-size 200; }
                sleep 1;
              done
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: site2-producer, namespace: amq-aa, labels: { app: site2-producer, demo: amq-aa, site: site2 } }
spec:
  replicas: 1
  selector: { matchLabels: { app: site2-producer } }
  template:
    metadata: { labels: { app: site2-producer, demo: amq-aa, site: site2 } }
    spec:
      containers:
        - name: producer
          image: registry.redhat.io/amq7/amq-broker-rhel9@sha256:ec6a178d76a1521ea68ef312b43db6b952802d02431ad81f1b9bd107015c621d
          command: ["/bin/bash","-c"]
          args:
            - |
              P='?reconnectAttempts=2&retryInterval=1000&callTimeout=4000&connectionTTL=6000&clientFailureCheckPeriod=2000'
              L="tcp://site2-broker-all-0-svc:61616$P"; R="tcp://site1-broker-all-0-svc:61616$P"
              echo "[SITE2-PRODUCER] -> site2Queue (prefers site2, fails over to site1)";
              while true; do
                /opt/amq/bin/artemis producer --url "$L" --user admin --password admin --destination queue://site2Queue --message-count 5 --sleep 1500 --message-size 200 \
                || { echo "[SITE2-PRODUCER] site2 down -> failover to site1"; /opt/amq/bin/artemis producer --url "$R" --user admin --password admin --destination queue://site2Queue --message-count 5 --sleep 1500 --message-size 200; }
                sleep 1;
              done
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: site1-consumer, namespace: amq-aa, labels: { app: site1-consumer, demo: amq-aa, site: site1 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: site1-consumer } }
  template:
    metadata: { labels: { app: site1-consumer, demo: amq-aa, site: site1 } }
    spec:
      containers:
        - name: consumer
          image: registry.redhat.io/amq7/amq-broker-rhel9@sha256:ec6a178d76a1521ea68ef312b43db6b952802d02431ad81f1b9bd107015c621d
          command: ["/bin/bash","-c"]
          args:
            - |
              P='?reconnectAttempts=2&retryInterval=1000&callTimeout=4000&connectionTTL=6000&clientFailureCheckPeriod=2000'
              L="tcp://site1-broker-all-0-svc:61616$P"; R="tcp://site2-broker-all-0-svc:61616$P"
              echo "[SITE1-CONSUMER] <- site1Queue (prefers site1, fails over to site2)";
              while true; do
                /opt/amq/bin/artemis consumer --url "$L" --user admin --password admin --destination queue://site1Queue --message-count 100000 --receive-timeout 15000 --verbose \
                || { echo "[SITE1-CONSUMER] site1 down -> failover to site2"; /opt/amq/bin/artemis consumer --url "$R" --user admin --password admin --destination queue://site1Queue --message-count 100000 --receive-timeout 15000 --verbose; }
                sleep 1;
              done
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: site2-consumer, namespace: amq-aa, labels: { app: site2-consumer, demo: amq-aa, site: site2 } }
spec:
  replicas: 2
  selector: { matchLabels: { app: site2-consumer } }
  template:
    metadata: { labels: { app: site2-consumer, demo: amq-aa, site: site2 } }
    spec:
      containers:
