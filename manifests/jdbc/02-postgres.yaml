apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: amq-jdbc-demo
type: Opaque
stringData:
  database-name: artemis
  database-user: artemis
  database-password: artemis
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: amq-jdbc-demo
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp3-csi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: amq-jdbc-demo
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: registry.redhat.io/rhel9/postgresql-15:latest
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_DATABASE
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: database-name } }
            - name: POSTGRESQL_USER
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: database-user } }
            - name: POSTGRESQL_PASSWORD
              valueFrom: { secretKeyRef: { name: postgres-credentials, key: database-password } }
            # More connections to support primary + backup + apps
            - name: POSTGRESQL_MAX_CONNECTIONS
              value: "100"
          readinessProbe:
            exec:
              command: ["/usr/libexec/check-container"]
            initialDelaySeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["/usr/libexec/check-container", "--live"]
            initialDelaySeconds: 30
            timeoutSeconds: 5
          resources:
            requests: { cpu: "100m", memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: amq-jdbc-demo
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
